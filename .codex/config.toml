# Project-local Codex defaults for Hashtag Robotic Studio.
# Loaded only when this project is trusted.

# Work autonomously inside this private product workspace.
approval_policy = "never"
sandbox_mode = "danger-full-access"

# Keep main-thread output compact. Detailed reasoning stays internal.
model_verbosity = "low"
model_reasoning_effort = "high"

# Reduce live web/tool noise unless the task explicitly needs current facts.
web_search = "cached"

# Let AGENTS.md plus project docs fit without making AGENTS.md itself too large.
project_doc_max_bytes = 65536

[features]
memories = true
goals = true
hooks = true
shell_snapshot = true
multi_agent = true

[agents]
max_threads = 8
max_depth = 1
job_max_runtime_seconds = 3600

