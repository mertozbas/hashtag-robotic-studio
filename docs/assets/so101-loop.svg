<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Hashtag Robotic Studio sistem akışı</title>
  <desc id="desc">Studio UI, local gateway, SafetyGate, LeRobot runtime, Strands agent ve Hugging Face eğitim hattı arasında hareketli veri akışı diyagramı.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071014"/>
      <stop offset="1" stop-color="#10181d"/>
    </linearGradient>
    <linearGradient id="cyanGreen" x1="0" x2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.49 0 0 0 0 0.83 0 0 0 0 0.99 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7dd3fc"/>
    </marker>
    <style>
      .label{font:700 18px Inter,Arial,sans-serif;fill:#edf7f5}
      .small{font:600 13px Inter,Arial,sans-serif;fill:#a6b8bd}
      .node{fill:#10191f;stroke:#2d3b42;stroke-width:2}
      .safe{fill:#221709;stroke:#facc15}
      .agent{fill:#10241d;stroke:#86efac}
      .policy{fill:#171126;stroke:#a78bfa}
      .flow{fill:none;stroke:#7dd3fc;stroke-width:3;stroke-dasharray:10 12;marker-end:url(#arrow)}
      .return{fill:none;stroke:#86efac;stroke-width:3;stroke-dasharray:6 10;marker-end:url(#arrow)}
      .data{fill:none;stroke:#facc15;stroke-width:3;stroke-dasharray:4 9;marker-end:url(#arrow)}
      .pulse{filter:url(#glow)}
    </style>
  </defs>

  <rect width="960" height="540" rx="18" fill="url(#bg)"/>
  <g opacity=".22" stroke="#7dd3fc" stroke-width="1">
    <path d="M80 105H880M80 205H880M80 305H880M80 405H880"/>
    <path d="M160 70V470M320 70V470M480 70V470M640 70V470M800 70V470"/>
  </g>

  <path id="uiGateway" class="flow" d="M255 160 C340 110 430 110 505 160"/>
  <path id="gatewaySafety" class="data" d="M620 160 C710 185 735 245 700 300"/>
  <path id="safetyRuntime" class="flow" d="M620 360 C535 420 420 420 340 360"/>
  <path id="runtimeStudio" class="return" d="M215 320 C160 255 170 205 255 160"/>
  <path id="agentPolicy" class="return" d="M255 360 C350 455 540 455 660 360"/>
  <path id="hfPolicy" class="data" d="M735 360 C810 290 805 210 705 160"/>

  <g transform="translate(90 122)">
    <rect class="node" width="190" height="76" rx="12"/>
    <text class="label" x="22" y="34">Studio UI</text>
    <text class="small" x="22" y="57">dashboard + guide</text>
  </g>

  <g transform="translate(398 122)">
    <rect class="node" width="220" height="76" rx="12"/>
    <text class="label" x="22" y="34">Local Gateway</text>
    <text class="small" x="22" y="57">REST + events</text>
  </g>

  <g transform="translate(650 122)">
    <rect class="safe" width="220" height="76" rx="12"/>
    <text class="label" x="22" y="34">SafetyGate</text>
    <text class="small" x="22" y="57">contracts + blockers</text>
  </g>

  <g transform="translate(90 322)">
    <rect class="agent" width="230" height="76" rx="12"/>
    <text class="label" x="22" y="34">Strands Agent</text>
    <text class="small" x="22" y="57">scoped robot tools</text>
  </g>

  <g transform="translate(365 322)">
    <rect class="node" width="230" height="76" rx="12"/>
    <text class="label" x="22" y="34">LeRobot Runtime</text>
    <text class="small" x="22" y="57">SO-101 truth layer</text>
  </g>

  <g transform="translate(650 322)">
    <rect class="policy" width="220" height="76" rx="12"/>
    <text class="label" x="22" y="34">Hugging Face</text>
    <text class="small" x="22" y="57">datasets + policies</text>
  </g>

  <circle class="pulse" r="8" fill="#7dd3fc">
    <animateMotion dur="4.8s" repeatCount="indefinite" rotate="auto">
      <mpath href="#uiGateway"/>
    </animateMotion>
  </circle>
  <circle class="pulse" r="7" fill="#facc15">
    <animateMotion dur="4.8s" begin=".8s" repeatCount="indefinite" rotate="auto">
      <mpath href="#gatewaySafety"/>
    </animateMotion>
  </circle>
  <circle class="pulse" r="8" fill="#86efac">
    <animateMotion dur="4.8s" begin="1.6s" repeatCount="indefinite" rotate="auto">
      <mpath href="#safetyRuntime"/>
    </animateMotion>
  </circle>
  <circle class="pulse" r="7" fill="#a78bfa">
    <animateMotion dur="4.8s" begin="2.4s" repeatCount="indefinite" rotate="auto">
      <mpath href="#agentPolicy"/>
    </animateMotion>
  </circle>

  <g transform="translate(84 462)">
    <rect x="0" y="0" width="792" height="38" rx="9" fill="#0b1115" stroke="#2d3b42"/>
    <text class="small" x="18" y="24">Rule: real motion stays blocked until port, calibration, mapping, duration, emergency stop, workspace_clear, and user_unlock are valid.</text>
  </g>
</svg>
